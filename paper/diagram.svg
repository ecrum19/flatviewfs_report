<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280">
  <style>
    .box { fill:#f5f7fb; stroke:#1f3c88; stroke-width:2; rx:6; ry:6; }
    .title { font: bold 13px sans-serif; fill:#1f3c88; }
    .text { font: 12px sans-serif; fill:#333; }
    .arrow { stroke:#444; stroke-width:2; marker-end: url(#arrowhead); fill:none; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444" />
    </marker>
  </defs>

  <!-- VCF to canonical package -->
  <rect class="box" x="20" y="30" width="180" height="80" />
  <text class="title" x="30" y="50">canonical_tsv.py</text>
  <text class="text" x="30" y="70">VCF → TSV + Parquet</text>
  <text class="text" x="30" y="88">records / info / format</text>
  <text class="text" x="30" y="106">header_lines.tsv, samples.tsv</text>

  <!-- Package -->
  <rect class="box" x="250" y="30" width="150" height="80" />
  <text class="title" x="260" y="50">Canonical package</text>
  <text class="text" x="260" y="70">Parquet + TSV bundle</text>
  <text class="text" x="260" y="88">one per VCF</text>

  <!-- Manifest -->
  <rect class="box" x="450" y="30" width="160" height="80" />
  <text class="title" x="460" y="50">Manifest</text>
  <text class="text" x="460" y="70">Routes + prepared SQL</text>
  <text class="text" x="460" y="88">Formatter = VCF</text>

  <!-- Arrows top -->
  <line class="arrow" x1="200" y1="70" x2="250" y2="70" />
  <line class="arrow" x1="400" y1="70" x2="450" y2="70" />

  <!-- DuckDB -->
  <rect class="box" x="250" y="150" width="150" height="80" />
  <text class="title" x="260" y="170">DuckDB</text>
  <text class="text" x="260" y="190">Prepared queries</text>
  <text class="text" x="260" y="208">Materialize cache file</text>

  <!-- flatviewfs / FUSE -->
  <rect class="box" x="450" y="150" width="160" height="80" />
  <text class="title" x="460" y="170">flatviewfs (FUSE)</text>
  <text class="text" x="460" y="190">Virtual file</text>
  <text class="text" x="460" y="208">Reads stream cache</text>

  <!-- arrows mid -->
  <line class="arrow" x1="330" y1="110" x2="330" y2="150" />
  <line class="arrow" x1="510" y1="110" x2="510" y2="150" />
  <line class="arrow" x1="400" y1="190" x2="450" y2="190" />

  <!-- User -->
  <rect class="box" x="50" y="150" width="130" height="80" />
  <text class="title" x="60" y="170">User</text>
  <text class="text" x="60" y="190">cat / mount / ls</text>

  <line class="arrow" x1="180" y1="190" x2="250" y2="190" />
</svg>
